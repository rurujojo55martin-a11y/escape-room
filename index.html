<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Escape Room</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="room-container">
        <h1>Multiplayer: Raum 1</h1>
        <p>Ihr müsst zusammenarbeiten! Wenn einer den Code knackt, entkommt ihr beide.</p>
        
        <blockquote style="font-style: italic; color: #ff9900;">
            "Das Jahr, in dem das World Wide Web erfunden wurde..."
        </blockquote>

        <div id="game-content">
            <input type="text" id="codeEingabe" placeholder="????" maxlength="4">
            <br>
            <button onclick="pruefeCode()">Code senden</button>
        </div>

        <div id="ausgabe" class="message">Warte auf Verbindung zum Server...</div>
        
        <button onclick="resetGame()" style="background-color: #ff3333; color: white; margin-top: 20px; font-size: 12px; padding: 5px 10px;">Spiel zurücksetzen</button>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
